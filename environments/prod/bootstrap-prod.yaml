apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prod-bootstrap
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io   
spec:
  project: default
  source:
    repoURL: https://github.com/marcelo-luizz/gitops-core-infra
    targetRevision: HEAD
    path: environments/prod
    directory:
      recurse: true
      include: "*.yaml"
  destination:
    server: https://kubernetes.default.svc
    namespace: crossplane-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true