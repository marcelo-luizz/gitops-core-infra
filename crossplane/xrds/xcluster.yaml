apiVersion: apiextensions.crossplane.io/v1
kind: CompositeResourceDefinition
metadata:
  name: xclusters.jeitto.io
spec:
  group: jeitto.io
  names:
    kind: XCluster
    plural: xclusters
  claimNames:
    kind: ClusterClaim
    plural: clusterclaims
  defaultCompositionRef:
    name: cluster-gke-standard
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                parameters:
                  type: object
                  required:
                    - environment
                    - region
                    - networkRef
                  properties:
                    environment:
                      type: string
                      enum:
                        - integration
                        - pre-prod
                        - prod
                    region:
                      type: string
                      default: southamerica-east1
                    networkRef:
                      type: string
                      description: "Name of the XNetwork to attach to"
                    minNodeCount:
                      type: integer
                      description: "Minimum nodes per zone"
                      default: 1
                      minimum: 1
                    maxNodeCount:
                      type: integer
                      description: "Maximum nodes per zone"
                      default: 5
                      minimum: 1
                      maximum: 100
                    machineType:
                      type: string
                      description: "GCE machine type for nodes"
                      default: e2-standard-4
                      enum:
                        - e2-standard-2
                        - e2-standard-4
                        - e2-standard-8
                        - e2-standard-16
                        - n2-standard-4
                        - n2-standard-8
                        - n2-standard-16
                    diskSizeGb:
                      type: integer
                      default: 100
                      minimum: 50
                      maximum: 500
                    releaseChannel:
                      type: string
                      default: STABLE
                      enum:
                        - RAPID
                        - REGULAR
                        - STABLE
            status:
              type: object
              properties:
                clusterName:
                  type: string
                endpoint:
                  type: string
                clusterCaCertificate:
                  type: string
