# ==========================================
# 1. TÓPICO PRINCIPAL (UPBOUND)
# ==========================================
apiVersion: pubsub.gcp.m.upbound.io/v1beta1
kind: Topic
metadata:
  name: ${{ values.topicname }}
  labels:
    environment: ${{ values.environment }}
    managed-by: backstage
spec:
  forProvider: {}
  providerConfigRef:
    kind: ProviderConfig
    name: default

---
# ==========================================
# 2. TÓPICO DE DEAD LETTER QUEUE (DLQ)
# ==========================================
apiVersion: pubsub.gcp.m.upbound.io/v1beta1
kind: Topic
metadata:
  name: ${{ values.topicname }}-dlq
  labels:
    environment: ${{ values.environment }}
spec:
  forProvider: {}
  providerConfigRef:
    kind: ProviderConfig
    name: default

---
# ==========================================
# 3. SUBSCRIPTION (UPBOUND)
# ==========================================
apiVersion: pubsub.gcp.m.upbound.io/v1beta1
kind: Subscription
metadata:
  name: ${{ values.topicname }}-sub
spec:
  forProvider:
  providerConfigRef:
    kind: ProviderConfig
    name: default
    topicRef:
      name: ${{ values.topicname }}
    ackDeadlineSeconds: 20
    # Configuração de Dead Letter conforme schema da Upbound
    deadLetterPolicy:
      - deadLetterTopicRef:
          name: ${{ values.topicname }}-dlq
        maxDeliveryAttempts: 5

---
# ==========================================
# 4. PERMISSÃO IAM (UPBOUND)
# ==========================================
apiVersion: pubsub.gcp.m.upbound.io/v1beta1
kind: TopicIAMMember
metadata:
  name: ${{ values.topicname }}-dlq-publisher
spec:
  forProvider:
  providerConfigRef:
    kind: ProviderConfig
    name: default
    topicRef:
      name: ${{ values.topicname }}-dlq
    role: roles/pubsub.publisher
    member: serviceAccount:service-${{ values.gcp_project_number }}@gcp-sa-pubsub.iam.gserviceaccount.com