apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: compute-engine-v1
  title: Provisionamento de Infraestrutura (Crossplane)
  description: "Gera manifestos Crossplane Upbound e abre PR no repositório correto (App ou Core)."
  tags:
    - gcp
    - crossplane
    - infrastructure
spec:
  owner: team-platform
  type: service

  parameters:
    - title: Escopo e Destino
      required:
        - scope
      properties:
        scope:
          title: Escopo de Implantação
          type: string
          description: "Defina se esta infraestrutura é para uma aplicação ou infraestrutura core."
          enum:
            - app-infra
            - core-infra
          enumNames:
            - "App Infra (gitops-app-infra)"
            - "Core Infra (gitops-core-infra)"

    - title: Configurações da Instância
      required:
        - instanceName
        - environment
        - team
      properties:
        instanceName:
          title: Nome da Instância / Recurso
          type: string
          description: "Nome único (ex: my-service-topic ou my-vm-name)."
        environment:
          title: Ambiente
          type: string
          enum:
            - integration
            - pre-prod
            - prod
          default: integration
        team:
          title: Time Responsável
          type: string
          ui:field: OwnerPicker
          ui:options:
            allowedKinds:
              - Group

  steps:
    # 1. Renderiza os manifestos do skeleton para uma pasta temporária
    - id: fetch-template
      name: Renderizando Manifestos
      action: fetch:template
      input:
        url: ./skeleton
        values:
          name: ${{ parameters.instanceName }}
          environment: ${{ parameters.environment }}
          team: ${{ parameters.team }}
          scope: ${{ parameters.scope }}
        targetPath: ./infra-temp

    # 2. Publica o Pull Request com lógica de decisão de repositório e caminho
    - id: create-pr
      name: Criando Pull Request
      action: publish:github:pull-request
      input:
        # Lógica de seleção de Repositório (Uso do >- para evitar \n no nome)
        repoUrl: >-
          ${{ 'github.com?repo=gitops-app-infra&owner=marcelo-luizz' if parameters.scope == 'app-infra' 
              else 'github.com?repo=gitops-core-infra&owner=marcelo-luizz' }}
        
        branchName: "infra-${{ parameters.scope }}-${{ parameters.instanceName }}"
        title: "infra(${{ parameters.scope }}): add ${{ parameters.instanceName }} em ${{ parameters.environment }}"
        description: |
          ### 🚀 Novo Recurso de Infraestrutura
          - **Tipo:** ${{ parameters.scope }}
          - **Ambiente:** ${{ parameters.environment }}
          - **Solicitante:** ${{ parameters.team }}
          
          Gerado automaticamente via Backstage IDP.
        
        sourcePath: ./infra-temp
        
        # Lógica de seleção de Caminho (TargetPath)
        targetPath: >-
          ${{ 'environments/' + parameters.environment + '/team-platform/pubsub/' + parameters.instanceName if parameters.scope == 'app-infra' 
              else 'environments/' + parameters.environment + '/southamerica-east1/compute/compute-engine/' + parameters.instanceName }}

  output:
    links:
      - title: "🔗 Acompanhar Pull Request no GitHub"
        url: ${{ steps['create-pr'].output.remoteUrl }}
      - title: "📂 Ver Repositório de Destino"
        url: >-
          ${{ 'https://github.com/marcelo-luizz/gitops-app-infra' if parameters.scope == 'app-infra' 
              else 'https://github.com/marcelo-luizz/gitops-core-infra' }}
    text:
      - title: "📘 Como funciona este provisionamento?"
        content: |
          Parabéns! O seu recurso foi solicitado e o Pull Request foi criado.

          ### 🚀 Fluxo de Provisionamento

          Quando este PR for aprovado (Merge), o seguinte fluxo GitOps "App of Apps" será acionado:

          ![Fluxo GitOps](./gitops-app-infra.png)

          ### 📂 Estrutura de Diretórios e Escopo

          O manifesto foi enviado para o repositório correto (`gitops-${{ parameters.scope }}`) e organizado na seguinte estrutura:

          ```
          environments/
          └── ${{ parameters.environment }}
              └── ${{ parameters.region or 'squad-folder' }} # Dependendo do escopo
                  └── ${{ parameters.scope }}
                      └── ${{ parameters.instanceName }}/
                          └── resource.yaml
          ```

          ### 🔄 Sincronização e Drift

          - O ArgoCD Root detecta a nova pasta.
          - O ArgoCD Child é criado automaticamente.
          - O Crossplane provisiona o recurso GCP usando o provedor da Upbound.
          - Se houver alteração manual no console do GCP (drift), o Crossplane reverterá para garantir a configuração Git.
