# =============================================================================
# ApplicationSet: core-environments
# Gera 1 Application por pasta em environments/ (integration, pre-prod, prod)
# Cada Application aplica todos os Claims de core infrastructure daquele env
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: core-environments
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - git:
        repoURL: "https://github.com/jeitto/gitops-core-infra.git"
        revision: HEAD
        directories:
          - path: "environments/*"
  template:
    metadata:
      name: "core-{{.path.basename}}"
      namespace: argocd
      labels:
        repo: core-infra
        environment: "{{.path.basename}}"
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: core-infra
      source:
        repoURL: "https://github.com/jeitto/gitops-core-infra.git"
        targetRevision: HEAD
        path: "{{.path.path}}"
        directory:
          recurse: true
          include: "*.yaml"
      destination:
        server: https://kubernetes.default.svc
        namespace: crossplane-system
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - ServerSideApply=true
        retry:
          limit: 3
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 1m
