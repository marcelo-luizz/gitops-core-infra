# =============================================================================
# ApplicationSet: crossplane-platform
# Gerencia os componentes do Crossplane (providers, configs, XRDs, compositions)
# Usa list generator para controle granular de namespace/scope por componente
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: crossplane-platform
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - list:
        elements:
          - name: argocd-projects
            path: argocd/projects
          # - name: crossplane-providers
          #   path: crossplane/providers
          #   namespace: crossplane-system
          # - name: crossplane-provider-configs
          #   path: crossplane/provider-configs
          #   namespace: crossplane-system
          # - name: crossplane-xrds
          #   path: crossplane/xrds
          #   namespace: crossplane-system
          # - name: crossplane-compositions
          #   path: crossplane/compositions
          #   namespace: crossplane-system
  template:
    metadata:
      name: "{{.name}}"
      namespace: argocd
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: platform
      source:
        repoURL: "https://github.com/jeitto/gitops-core-infra.git"
        targetRevision: HEAD
        path: "{{.path}}"
        directory:
          recurse: true
          include: "*.yaml"
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{.namespace}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
