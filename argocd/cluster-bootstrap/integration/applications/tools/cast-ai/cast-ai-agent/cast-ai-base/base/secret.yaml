apiVersion: external-secrets.io/v1alpha1
kind: ExternalSecret
metadata:
  name: cast-ai-api-key
  namespace: castai-agent
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: gcp-backend-integration
  target:
    name: castai-api-key-secret
  data:
  - secretKey: API_KEY
    remoteRef:
      key: CASTAI_API_KEY_INTEGRATION
  - secretKey: CLUSTER_ID
    remoteRef:
      key: CASTAI_CLUSTER_ID_INTEGRATION
