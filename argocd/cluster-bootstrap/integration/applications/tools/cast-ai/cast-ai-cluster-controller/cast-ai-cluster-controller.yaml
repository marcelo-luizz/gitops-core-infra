apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: castai-cluster-controller-integration
  namespace: sistemas
  annotations:
    argocd.argoproj.io/sync-wave: '2'  
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://castai.github.io/helm-charts
    chart: castai-cluster-controller
    targetRevision: '0.85.1'
    helm:
      parameters:
        - name: castai.apiKeySecretRef
          value: 'castai-api-key-secret'
        - name: castai.clusterID
          value: '5757f36e-b19c-437b-8711-fe6316eca14c'
        - name: autoscaling.enabled
          value: 'true'
      # values: |
      #   nodeSelector:
      #     "autoscaling.cast.ai/removal-disabled": "true"
      #     "scheduling.cast.ai/node-template": "castai-node-pool-integration"
      #   tolerations:
      #   - key: nodepool
      #     operator: Equal
      #     value: castai-node-pool-integration
      #     effect: NoSchedule
  destination:
    name: cluster-integration
    namespace: castai-agent
  syncPolicy:
    automated: {}
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true