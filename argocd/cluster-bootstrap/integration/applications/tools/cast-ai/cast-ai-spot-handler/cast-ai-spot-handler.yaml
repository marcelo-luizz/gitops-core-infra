apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: castai-spot-handler-integration
  namespace: sistemas
  annotations:
    argocd.argoproj.io/sync-wave: '2'  
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://castai.github.io/helm-charts
    chart: castai-spot-handler
    targetRevision: '0.28.0'
    helm:
      parameters:
        - name: apiKeySecretRef
          value: 'castai-api-key-secret'
        - name: castai.clusterID
          value: '5757f36e-b19c-437b-8711-fe6316eca14c'
        - name: castai.provider
          value: 'gcp'
  destination:
    name: cluster-integration
    namespace: castai-agent
  syncPolicy:
    automated: {}
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true