apiVersion: external-secrets.io/v1alpha1
kind: ExternalSecret
metadata:
  name: titlis-secret
  namespace: titlis
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: gcp-backend-integration
  target:
    name: titlis-datadog-keys
  data:
  - secretKey: DD_API_KEY
    remoteRef:
      conversionStrategy: Default
      key: DATADOG_API_KEY