apiVersion: external-secrets.io/v1alpha1
kind: ClusterSecretStore
metadata:
  name: gcp-backend-integration
spec:
  provider:
      gcpsm:
        projectID: jeitto-integracao
        auth:
          workloadIdentity:
            clusterLocation: southamerica-east1
            clusterName: cluster-integration
            serviceAccountRef:
              name: external-secrets-service-account-gcp
              namespace: external-secrets

---

apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-secrets-service-account-gcp
  namespace: external-secrets
  annotations:
    iam.gke.io/gcp-service-account: svc-secret-manager@jeitto-integracao.iam.gserviceaccount.com
