apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cluster-base-secret-store-integration
  namespace: sistemas 
  annotations:
    argocd.argoproj.io/sync-wave: '1'
  finalizers:
  - resources-finalizer.argocd.argoproj.io   
spec:
  project: default 
  sources: 
    - repoURL: 'https://gitlab-new.jeitto.com.br/devops/jeitto-iac/gitops-infra.git'
      targetRevision: master
      path: cluster-bootstrap/integration/applications/tools/external-secrets/cluster-secret-store/base
  destination:
    name: cluster-integration
    namespace: secret-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true