apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: datadog-base-integration
  namespace: sistemas 
  annotations:
    argocd.argoproj.io/sync-wave: '1'
  finalizers:
  - resources-finalizer.argocd.argoproj.io   
spec:
  project: default 
  sources: 
    - repoURL: 'https://gitlab-new.jeitto.com.br/devops/jeitto-iac/gitops-infra.git'
      targetRevision: master
      path: cluster-bootstrap/integration/applications/tools/datadog/datadog-secret/secret
  destination:
    name: cluster-integration
    namespace: datadog
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true