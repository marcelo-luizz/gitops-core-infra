apiVersion: external-secrets.io/v1alpha1
kind: ExternalSecret
metadata:
  name: datadog-api-key
  namespace: datadog
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: gcp-backend-integration
  target:                                                             
    name: datadog-secret
  data:                                                       
  - secretKey: api-key
    remoteRef:
      conversionStrategy: Default
      key: DATADOG_API_KEY