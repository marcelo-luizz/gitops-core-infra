
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: datadog-integration
  namespace: sistemas
  annotations:
    argocd.argoproj.io/sync-wave: '2'
  finalizers:
  - resources-finalizer.argoproj.io
spec:
  project: default
  sources:
    - chart: datadog
      repoURL: https://helm.datadoghq.com
      targetRevision: 3.131.1
      helm:
        valueFiles:
          - $values/cluster-bootstrap/integration/applications/tools/datadog/values/values.yaml
    - repoURL: 'https://gitlab-new.jeitto.com.br/devops/jeitto-iac/gitops-infra.git'
      targetRevision: master
      ref: values
  destination:
    namespace: datadog
    name: cluster-integration
  syncPolicy:
    automated: {}
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true