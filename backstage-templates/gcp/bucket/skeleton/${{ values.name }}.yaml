apiVersion: storage.gcp.m.upbound.io/v1beta1
kind: Bucket
metadata:
  annotations:
  labels:
    example: 'true'
    testing.upbound.io/example-name: bucket-object
  name: ${{ values.name }}
  namespace: crossplane-system
spec:
  forProvider:
    location: US
    storageClass: MULTI_REGIONAL
  providerConfigRef:
    name: default
    kind: ProviderConfig
