# Tópico Principal
apiVersion: pubsub.gcp.m.upbound.io/v1beta1
kind: Topic
metadata:
  name: ${{ values.name }}-topic
  labels:
    team: ${{ (values.team | parseEntityRef).name if values.team else "no-team" }}
    env: ${{ values.environment }}
    resource-name: ${{ values.name }}-topic
spec:
  forProvider: {}
  providerConfigRef:
    name: default
    kind: ProviderConfig

---
# Subscription Principal
apiVersion: pubsub.gcp.m.upbound.io/v1beta1
kind: Subscription
metadata:
  name: ${{ values.name }}-subscription
  labels:
    team: ${{ (values.team | parseEntityRef).name if values.team else "no-team" }}
    env: ${{ values.environment }}
    resource-name: ${{ values.name }}-subscription
spec:
  forProvider:
    topicSelector:
      matchLabels:
        resource-name: ${{ values.name }}-topic
    ackDeadlineSeconds: 30
    messageRetentionDuration: "172800s"
    expirationPolicy:
      ttl: "2678400s"
    {% if values.dlqEnabled == true or values.dlqEnabled == "true" %}
    deadLetterPolicy:
        deadLetterTopicSelector:
          matchLabels:
            resource-name: ${{ values.name }}-dlq
        maxDeliveryAttempts: 5
    {% endif %}
  providerConfigRef:
    name: default
    kind: ProviderConfig

{% if values.dlqEnabled == true or values.dlqEnabled == "true" %}
---
# Tópico de DLQ
apiVersion: pubsub.gcp.m.upbound.io/v1beta1
kind: Topic
metadata:
  name: ${{ values.name }}-dlq
  labels:
    team: ${{ (values.team | parseEntityRef).name if values.team else "no-team" }}
    env: ${{ values.environment }}
    resource-name: ${{ values.name }}-dlq
spec:
  forProvider: {}
  providerConfigRef:
    name: default
    kind: ProviderConfig

---
# Subscription de DLQ (Para drenar as mensagens presas)
apiVersion: pubsub.gcp.m.upbound.io/v1beta1
kind: Subscription
metadata:
  name: ${{ values.name }}-dlq
  labels:
    team: ${{ (values.team | parseEntityRef).name if values.team else "no-team" }}
    env: ${{ values.environment }}
    resource-name: ${{ values.name }}-dlq-subscription
spec:
  forProvider:
    topicSelector:
      matchLabels:
        resource-name: ${{ values.name }}-dlq
    ackDeadlineSeconds: 30
    messageRetentionDuration: "172800s"
    expirationPolicy:
      ttl: "2678400s"
  providerConfigRef:
    name: default
    kind: ProviderConfig

---
# Permissão Necessária: PubSub Service Agent -> Publicar na DLQ
apiVersion: pubsub.gcp.m.upbound.io/v1beta1
kind: TopicIAMMember
metadata:
  name: "${{ values.name }}-dlq-auth"
spec:
  forProvider:
    role: roles/pubsub.publisher
    member: "serviceAccount:service-509332012213@gcp-sa-pubsub.iam.gserviceaccount.com"
    topicSelector:
      matchLabels:
        resource-name: ${{ values.name }}-dlq
  providerConfigRef:
    name: default
    kind: ProviderConfig
---
# Isso resolve o erro "Assign Subscriber role"
apiVersion: pubsub.gcp.m.upbound.io/v1beta1
kind: SubscriptionIAMMember
metadata:
  name: "${{ values.name }}-subscriber-auth"
spec:
  forProvider:
    role: roles/pubsub.subscriber
    member: "serviceAccount:service-509332012213@gcp-sa-pubsub.iam.gserviceaccount.com"
    subscriptionSelector:
      matchLabels:
        resource-name: ${{ values.name }}-subscription
  providerConfigRef:
    name: default
    kind: ProviderConfig
{% endif %}