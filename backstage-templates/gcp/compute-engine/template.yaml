apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: compute-engine-v1
  title: Provisionamento de Infraestrutura (Crossplane)
  description: "Gera manifestos Crossplane Upbound e abre PR no repositório correto (App ou Core)."
  tags:
    - gcp
    - crossplane
    - infrastructure
spec:
  owner: team-platform
  type: service

  parameters:
    - title: Configurações da Instância
      required:
        - scope
        - instanceName
        - environment
        - team
      properties:
        scope:
          title: Escopo de Implantação
          type: string
          ui:widget: radio
          description: |
            * **App Infra (Padrão):** Para recursos que servem diretamente sua aplicação (PubSub, Buckets). Uso geral para times de engenharia.
            * **Core Infra:** Para componentes de base e fundação. Uso restrito ao time de Plataforma/SRE.
          enum:
            - app-infra
            - core-infra
          enumNames:
            - "App Infra (Uso Geral para Times de Engenharia)"
            - "Core Infra (Infraestrutura de Base/Plataforma)"
        instanceName:
          title: Nome da Instância / Recurso
          type: string
          description: "Nome único (ex: my-service-topic ou my-vm-name)."
        environment:
          title: Ambiente
          type: string
          enum:
            - stage
            - homolog
          default: stage
        team:
          title: Time Responsável
          type: string
          ui:field: OwnerPicker
          ui:options:
            allowedKinds:
              - Group

  steps:
    - id: fetch-template
      name: Renderizando Manifestos
      action: fetch:template
      input:
        url: ./skeleton
        values:
          name: ${{ parameters.instanceName }}
          environment: ${{ parameters.environment }}
          team: ${{ parameters.team }}
          scope: ${{ parameters.scope }}
        targetPath: ./infra-temp

    - id: create-pr
      name: Criando Pull Request
      action: publish:github:pull-request
      input:
        repoUrl: >-
          ${{ 'github.com?repo=gitops-app-infra&owner=marcelo-luizz' if parameters.scope == 'app-infra' 
              else 'github.com?repo=gitops-core-infra&owner=marcelo-luizz' }}
        
        branchName: "infra-${{ parameters.scope }}-${{ parameters.instanceName }}"
        title: "infra(${{ parameters.scope }}): add ${{ parameters.instanceName }} em ${{ parameters.environment }}"
        description: |
          ### 🚀 Novo Recurso de Infraestrutura
          - **Tipo:** ${{ parameters.scope }}
          - **Ambiente:** ${{ parameters.environment }}
          - **Time:** ${{ (parameters.team | parseEntityRef).name }}
          
          Gerado automaticamente via Backstage IDP.
        
        sourcePath: ./infra-temp
        
        # CAMINHO CORRIGIDO AQUI:
        targetPath: >-
          ${{ 'environments/' + parameters.environment + '/teams/southamerica-east1/'  + (parameters.team | parseEntityRef).name + '/compute-engine/' + parameters.instanceName if parameters.scope == 'app-infra' 
              else 'environments/' + parameters.environment + '/southamerica-east1/compute-engine/' + parameters.instanceName }}

  output:
    links:
      - title: "🔗 Acompanhar Pull Request no GitHub"
        url: ${{ steps['create-pr'].output.remoteUrl }}
    text:
      - title: "📘 Como funciona este provisionamento?"
        content: |
          Parabéns! O seu recurso foi solicitado.

          ### 🚀 Fluxo de Provisionamento
          ![Fluxo GitOps](https://raw.githubusercontent.com/marcelo-luizz/gitops-core-infra/main/backstage-templates/gcp/compute-engine/gitops-app-infra.png)

          ### 📂 Destino do Manifesto
          O arquivo foi enviado para o repositório **gitops-${{ parameters.scope }}**.
          
          **Caminho final:**
          `environments/${{ parameters.environment }}/${{ (parameters.team | parseEntityRef).name if parameters.scope == 'app-infra' else 'southamerica-east1' }}/compute-engine/${{ parameters.instanceName }}`